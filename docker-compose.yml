
services:
  authservice:
    build: ./backend/Auth_service
    ports:
      - "8083:8082"
    restart: always
    networks:
      - soe
  
  dbservice:
    build: ./backend/db_service
    ports:
      - "8082:8081"
    networks:
      - db
      - soe

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: TestPassword
      POSTGRES_DB: testdb
    ports:
      - "5439:5432"
    networks:
      - db
    restart: always
  
  # frontend:
  #   build: ./frontend/expense_static
  #   ports:
  #     - "3000:3000"
  #   restart: always

networks:
  db:
    driver: bridge
  soe:
    driver: bridge
