version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: expense-postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: TestPassword
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db
    restart: unless-stopped

  dbservice:
    image: gurutejadocker/expense-db-service:latest
    container_name: expense-db-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testdb
      SPRING_DATASOURCE_USERNAME: testuser
      SPRING_DATASOURCE_PASSWORD: TestPassword
    networks:
      - db
      - soe
    restart: unless-stopped

  authservice:
    image: gurutejadocker/expense-auth-service:latest
    container_name: expense-auth-service
    ports:
      - "8082:8082"
    depends_on:
      - dbservice
    networks:
      - soe
    restart: unless-stopped

  appservice:
    image: gurutejadocker/expense-app-service:latest
    container_name: expense-app-service
    ports:
      - "8080:8080"
    depends_on:
      - authservice
      - dbservice
    networks:
      - soe
    restart: unless-stopped

  frontend:
    image: gurutejadocker/expense-frontend:latest
    container_name: expense-frontend
    ports:
      - "3000:3000"
    depends_on:
      - appservice
    networks:
      - soe
    restart: unless-stopped

networks:
  db:
    driver: bridge
  soe:
    driver: bridge

volumes:
  postgres_data: